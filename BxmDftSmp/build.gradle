// 로컬개발환경스크립트
configurations {
	downAppPar
}

task buildApplication(type: Jar) {
	group='BXM'
	description='BXM 어플리케이션을 빌드하여 Jar 및 Par 파일을 생성합니다.'
	
	//ignore up-to-date
	outputs.upToDateWhen { false }
	
	//create .par
	enabled = true
	from('META-INF') {
		include 'bxm-application.xml'
		into 'META-INF'
	}
	from (sourceSets.main.output) {
		into 'classes'
	}
	from('src/main/java') {
		include '**/*.dbio'
		into 'classes'
	}
	archiveExtension.set("par")
}

buildApplication.dependsOn build

task deployApplication {
	group='BXM'
	description='BXM 어플리케이션 클래스를 로컬에 설치된 BXM의 어플리케이션 홈으로 배포합니다.'
	
	doFirst {
		def del=System.getProperty('delete.before.deploy', 'false')
		
		if(del.equalsIgnoreCase('true')) {
			delete "${applicationHome}/${applicationName}"
			delete "${wasHome}/${applicationName}"
		}
	}
	
	doLast {
		ant.copy(todir: "${applicationHome}/${applicationName}/classes") {
			fileset(dir: "${applicationOutput}/main")
		}
		
		ant.copy(todir: "${applicationHome}/${applicationName}/META-INF", overwrite: 'true') {
			fileset(dir: 'META-INF')
		}
	}
}

task downloadBinary {
	group='BXM'
	description='BXM 어플리케이션이 참조하는 어플리케이션의 Jar 및 Par 파일을 다운로드 합니다.'
	
	doLast {
		def extract=System.getProperty('extract.application.par', 'false')
		
		configurations.downAppPar.collect {
			def file= it;
			def extension = file.name.substring(file.name.lastIndexOf('.') + 1)
								
			if(extension.equals('par')) {
				if(extract.equalsIgnoreCase('true')) {
					copy {
						from {
							zipTree(file)
						}
						
						into "${applicationHome}/" + file.name.replaceAll('(.*)-[0-9]+\\..*.par', '$1')
					}
				} else {
					copy {
						from {
							file
						}
						
						into "${applicationHome}"
						rename '(.*)-[0-9]+\\..*.par', '$1.par'
					}
				}
			}
		}
	}
}
// buildscript
buildscript {
	repositories {
	}
	dependencies {
	}
}

// plugins
plugins {
	id 'java-library'
	id 'eclipse'
	id 'maven-publish'
//	id 'bxm.encryptor.password-encrypt' version '1.0.0'
}

// variables
group = 'io.bankwareglobal.bxm'
version = '0.0.1-SNAPSHOT'

java {
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

// repositories
repositories {
	maven {
		url "${deps_repo_url}"
		credentials {
			username "${deps_repo_user}"
			password "${deps_repo_pwd}"
		}
		allowInsecureProtocol  = true
	}
}

// jar
jar {
    enabled = true
    from('src/main/java') {
		include  '**/*.dbio'
	}
	duplicatesStrategy = 'exclude'
}

// sourceSet
sourceSets {
    main {
        java {
            // include *.dbio
            srcDirs = ['src/main/java', 'src/main/resources', 'src/gen/java']
        }
        resources {
            srcDirs = ['src/main/resources', 'src/main/java', 'src/gen/java']
            include '**/*.omm', '**/*.dbio'
        }
    }
}

// test
test {
}

// publising
publishing {
	publications {
		mavenJava(MavenPublication) {
			artifact jar.archiveFile.get().asFile
		}
	}
	repositories {
		maven {
			url "${publish_repo_url}"
			credentials {
				username "${publish_repo_user}"
				password "${publish_repo_pwd}"
			}
		}
	}
}

// dependencies
dependencies {

    api fileTree(dir: 'C:/BXMStudio/bxm/localDev/bxm/lib', include: '**/*.jar')

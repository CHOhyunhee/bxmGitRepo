	/*
	api group: 'bxm-runtime', name: 'bxm-container', version: '6.0.0', transitive: false
	api group: 'bxm-runtime', name: 'bxm-context', version: '6.0.0', transitive: false
	api group: 'bxm-runtime', name: 'bxm-default-extension', version: '6.0.0', transitive: false
	*/
	
	// BX-Common
		/*
	api group: 'bx-fw-common', name: 'bx-fwc-common', version: '2.0.0', transitive: false
	api group: 'bx-fw-common', name: 'bx-fwc-omm-common', version: '2.0.0', transitive: false
	api group: 'bx-fw-common', name: 'bx-fwc-omm-marshaller', version: '2.0.0', transitive: false
	api group: 'bx-fw-common', name: 'bx-fwc-common-log', version: '2.0.0', transitive: false
		*/
	
	// BX-Studio
		/*
